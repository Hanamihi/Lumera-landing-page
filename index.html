    <style>
        /* --- TỐI ƯU CHO ĐIỆN THOẠI (Màn hình nhỏ hơn 768px) --- */
        @media (max-width: 768px) {body { padding: 10px; }
    .map-container {
        margin-right: 0; /* Bỏ khoảng trống bên phải */
        width: 100%;     /* Bản đồ lấy hết chiều rộng */
        height: 60vh;    /* Giảm chiều cao bản đồ một chút */
    }

    #info-box {
        position: relative; /* Không ghim trên màn hình nữa */
        top: 0;
        right: 0;
        width: 100%;      /* Bảng thông tin rộng 100% */
        margin-top: 20px; /* Đẩy xuống dưới bản đồ */
        box-sizing: border-box;
        border-top: 5px solid #d35400;
        border-radius: 12px;
    }
}
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
        }
        
   .map-container { 
            position: relative; 
            background: white; 
            padding: 20px; /* Mẹo: Nên giảm padding từ 40px xuống 20px để bản đồ có nhiều không gian hiển thị hơn */
            border-radius: 15px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.08); 
            margin-top: 20px;
            margin-right: 320px; 
            
            /* --- THÊM 3 DÒNG NÀY ĐỂ FIX LỖI CO RÚT --- */
            width: calc(100vw - 380px); /* Tự động lấy full màn hình trừ đi không gian của Popup bên phải */
            height: 80vh;               /* Chiều cao bằng 80% màn hình */
            box-sizing: border-box;
        }

        .lot-label {
            font-size: 4px; /* Chỉnh kích cỡ chữ nhỏ lại cho vừa lô đất */
            font-weight: bold;
            fill: #333; /* Màu chữ */
            pointer-events: none; /* QUAN TRỌNG: Để chữ không ngăn cản việc click vào lô đất */
            text-shadow: 0.5px 0.5px 0px white; /* Giúp chữ nổi bật trên nền màu */
            user-select: none; /* Khách không bôi đen text được */
        }

        /* --- BIẾN POPUP THÀNH SIDEBAR CỐ ĐỊNH --- */
        #info-box {
            position: fixed;    /* Cố định với khung hình trình duyệt */
            top: 20px;          /* Cách mép trên 20px */
            right: 20px;        /* Cách mép phải 20px */
            display: none;      /* Mặc định ẩn */
            background: white; 
            border: none;
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 280px;       /* Cố định chiều rộng */
            z-index: 1000;      /* Luôn nằm trên cùng */
            border-top: 8px solid #d35400; /* Thanh màu nhấn mạnh phía trên */
            transition: all 0.3s ease;
        }

        #info-box h3 { 
            margin: 0 0 15px 0; 
            color: #d35400; 
            font-size: 22px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 10px; 
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px dashed #f0f0f0;
            padding-bottom: 5px;
        }

        p { margin: 8px 0; font-size: 14px; color: #555; }
        b { color: #222; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }

        .floor-title {
            font-weight: bold;
            color: #7f8c8d;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 10px;
            display: block;
        }

/* Hiệu ứng khi rê chuột vào lô đất (Chỉ nhận LK và HH) */
        g[id^="LK"], g[id^="HH"] { 
            transition: all 0.25s ease; 
        }
        
        g[id^="LK"]:hover, g[id^="HH"]:hover { 
            opacity: 0.6; 
            cursor: pointer; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.4)); 
        }
    </style>

    // BẢN SỬA 1: Lấy trực tiếp Object dữ liệu từ mảng rawData
    const dataBDS = rawData[0]; 

    const infoBox = document.getElementById('info-box');

    // 2. Xử lý gộp: Vừa tạo nhãn, vừa gán sự kiện Click
    document.querySelectorAll('svg > g[id]').forEach(lot => {
        const id = lot.id;

        /// BƯỚC A: TẠO NHÃN TÊN VÀ TỰ ĐỘNG XOAY
        if (id.startsWith('LK') || id.startsWith('HH')) {
            const bbox = lot.getBBox();
            const centerX = bbox.x + bbox.width / 2;
            const centerY = bbox.y + bbox.height / 2;

            // --- THUẬT TOÁN TÍNH GÓC XOAY CHO CHỮ ---
            let textAngle = 0;
            const shape = lot.querySelector('rect, polygon, path'); // Tìm phần tử vẽ hình bên trong lô đất

            if (shape) {
                if (shape.tagName.toLowerCase() === 'rect') {
                    // Xử lý nếu lô đất là thẻ <rect>
                    let baseAngle = 0;
                    const w = parseFloat(shape.getAttribute('width'));
                    const h = parseFloat(shape.getAttribute('height'));
                    
                    // Nếu chiều cao > chiều rộng, chữ mặc định xoay dọc 90 độ
                    if (h > w) baseAngle = -90; 

                    // Nếu thẻ <rect> có bị xoay sẵn (vd góc chéo) thì cộng dồn góc xoay đó vào
                    const transform = shape.getAttribute('transform');
                    if (transform && transform.includes('rotate')) {
                        const match = transform.match(/rotate\(([-0-9.]+)/);
                        if (match) baseAngle += parseFloat(match[1]);
                    }
                    textAngle = baseAngle;

                } else if (shape.tagName.toLowerCase() === 'polygon') {
                    // Xử lý nếu lô đất là thẻ <polygon> (đa giác)
                    const pointsStr = shape.getAttribute('points').trim().split(/[\s,]+/);
                    const points = [];
                    for (let i = 0; i < pointsStr.length; i += 2) {
                        if (pointsStr[i] !== undefined && pointsStr[i+1] !== undefined) {
                            points.push({x: parseFloat(pointsStr[i]), y: parseFloat(pointsStr[i+1])});
                        }
                    }
                    
                    // Tìm cạnh dài nhất của đa giác để đặt chữ chạy dọc theo cạnh đó
                    if (points.length >= 3) {
                        let maxDist = 0;
                        for (let i = 0; i < points.length; i++) {
                            let p1 = points[i];
                            let p2 = points[(i + 1) % points.length];
                            let dx = p2.x - p1.x;
                            let dy = p2.y - p1.y;
                            let dist = dx*dx + dy*dy; // Bình phương khoảng cách
                            if (dist > maxDist) {
                                maxDist = dist;
                                // Tính góc của cạnh bằng hàm arctan
                                textAngle = Math.atan2(dy, dx) * (180 / Math.PI);
                            }
                        }
                    }
                }
            }

            // Chuẩn hóa góc để chữ không bị lộn ngược đầu (chỉ cho phép góc từ -89 độ đến 90 độ)
            while (textAngle > 90) textAngle -= 180;
            while (textAngle <= -90) textAngle += 180;
            // ------------------------------------------

            const textLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textLabel.setAttribute("x", centerX);
            textLabel.setAttribute("y", centerY);
            textLabel.setAttribute("text-anchor", "middle");
            textLabel.setAttribute("dominant-baseline", "middle");
            textLabel.setAttribute("class", "lot-label");
            
            // Lệnh quan trọng: Ép chữ xoay một góc 'textAngle' quanh tâm 'centerX, centerY'
            textLabel.setAttribute("transform", `rotate(${textAngle} ${centerX} ${centerY})`);
            
            textLabel.textContent = id; 
            lot.appendChild(textLabel);
        }
        // BƯỚC B: GÁN SỰ KIỆN CLICK
        lot.addEventListener('click', function(e) {
            const info = dataBDS[id]; // Lấy thông tin lô đất dựa theo ID

            if (info) {

                // BẢN SỬA 2: Gọi đúng tên key (chữ thường) khớp với cấu trúc JSON
                document.getElementById('malo').innerText = "Lô: " + id;
                document.getElementById('trangThai').innerText = info.trangThai;
                document.getElementById('loai').innerText = info.loai;
                document.getElementById('dientich').innerText = info.dienTichLo;
                document.getElementById('sotang').innerText = info.chieuCao;
                document.getElementById('dtxd').innerText = info.dienTichXD;
                document.getElementById('matdo').innerText = info.matDo;
                
                document.getElementById('t1').innerText = info.tang1;
                document.getElementById('t2').innerText = info.tang2;
                document.getElementById('t3').innerText = info.tang3;
                document.getElementById('t4').innerText = info.tang4_tum;
                document.getElementById('t5').innerText = info.tang5;

                const rowT4 = document.getElementById('row-t4');
                const rowT5 = document.getElementById('row-t5');

                // BẢN SỬA 3: Kiểm tra nếu ID lô đất bắt đầu bằng "LK" (Liền kề)
                if (id.startsWith("LK")) {
                    rowT4.querySelector('span').innerText = "Tầng Tum:";
                    rowT5.style.display = "none"; // Ẩn dòng Tầng 5
                } else {
                    // Nếu là Hỗn hợp (HH)
                    rowT4.querySelector('span').innerText = "Tầng 4:";
                    rowT5.style.display = "flex"; // Hiện dòng Tầng 5
                }

                // Hiển thị Popup
                infoBox.style.display = "block";
                e.stopPropagation(); // Ngăn sự kiện click truyền ra ngoài body
            }
        });
    });
    // Đóng popup khi click ra ngoài bản đồ
    document.addEventListener('click', function() {
        infoBox.style.display = "none";
    });
infoBox.addEventListener('click', function(e) {
        e.stopPropagation();
