<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <meta charset="UTF-8">
    <title>Quản lý đất ở thấp tầng</title>
<style>
    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        background: #f0f2f5; 
        margin: 0; 
        padding: 20px; 
    }
    
    /* --- KHUNG CHỨA BẢN ĐỒ --- */
    .map-container { 
        position: relative; 
        background: white; 
        padding: 10px;
        border-radius: 15px; 
        box-shadow: 0 4px 25px rgba(0,0,0,0.08); 
        margin-top: 20px;
        
        /* Mặc định cho PC: Chừa chỗ cho Sidebar bên phải */
        margin-right: 320px; 
        width: calc(100vw - 380px); 
        height: 80vh;
        min-height: 500px;
        box-sizing: border-box;
        overflow: hidden; /* PC: Đảm bảo ảnh không tràn ra ngoài khi zoom */
    }

    /* --- NHÃN LÔ ĐẤT (SVG TEXT) --- */
    .lot-label {
        font-size: 4px; 
        font-weight: bold;
        fill: #333; 
        pointer-events: none; 
        text-shadow: 0.5px 0.5px 0px rgba(255,255,255,0.8);
        user-select: none;
    }

    /* --- SIDEBAR THÔNG TIN (POPUP) --- */
    #info-box {
        position: fixed;    
        top: 20px;          
        right: 20px;        
        display: none;      
        background: white; 
        padding: 25px; 
        border-radius: 16px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        width: 300px; 
        z-index: 1000;      
        border-top: 8px solid #d35400; 
        transition: all 0.3s ease;
        box-sizing: border-box; 
    }

    #info-box h3 { 
        margin: 0 0 15px 0; 
        color: #d35400; 
        font-size: 22px; 
        border-bottom: 1px solid #eee; 
        padding-bottom: 10px; 
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        border-bottom: 1px dashed #f0f0f0;
        padding-bottom: 5px;
        font-size: 14px;
    }

    .info-row b { color: #222; }

    .floor-title {
        font-weight: bold;
        color: #7f8c8d;
        text-transform: uppercase;
        font-size: 12px;
        margin-bottom: 10px;
        display: block;
    }

    /* --- HIỆU ỨNG LÔ ĐẤT (CHỈ LK VÀ HH) --- */
    g[id^="LK"], g[id^="HH"] { 
        transition: all 0.2s ease; 
        cursor: pointer;
    }
    
    g[id^="LK"]:hover, g[id^="HH"]:hover { 
        opacity: 0.5; 
        filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); 
    }

    /* --- ĐIỀU CHỈNH RIÊNG CHO ĐIỆN THOẠI --- */
    @media (max-width: 768px) {
        body { 
            padding: 10px; 
            padding-bottom: 60px; 
        }

        .map-container {
            margin-right: 0; 
            width: 100%;     
            height: auto;       /* Bản sửa: Cho khung tự động dài ra chứa hết bảng thông tin */
            min-height: unset;
            overflow: visible;  /* Bản sửa: Không cắt bỏ phần dưới của bảng nữa */
        }

        /* Định hình lại chiều cao cho riêng bản đồ trên Mobile */
        #map-svg {
            height: 50vh !important; 
            min-height: 350px;
            background: white;
        }

        #info-box {
            position: relative; 
            top: 0;
            right: 0;
            width: 100%;      
            margin-top: 15px;
            margin-bottom: 20px;
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #info-box h3 { font-size: 18px; margin-bottom: 10px; }
        .info-row { font-size: 13px; margin-bottom: 8px; }
    }
</style>
</head>

                <div class="info-row" id="row-t5"><span>Tầng 5:</span> <b id="t5"></b></div>
            </div>
        </div>
    </div>
    <script>
    // 1. DÁN ĐƯỜNG LINK GOOGLE APP SCRIPT CỦA BẠN VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5ADG8W8fLHU4aCP27p3j4N0sPlQH7jkBkE3tgkzMBGrFtvVk9eRf3j--Ls4LIbo6j/exec"; 

    let dataBDS = {}; // Biến chứa dữ liệu lấy từ mạng về
    const infoBox = document.getElementById('info-box');

    // 2. KÉO DỮ LIỆU TỪ GOOGLE SHEET KHI TẢI TRANG
    fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
            dataBDS = data; // Nạp dữ liệu vào biến
            initMap();      // Bắt đầu vẽ bản đồ
        })
        .catch(error => {
            console.error("Lỗi tải dữ liệu:", error);
            alert("Không thể tải dữ liệu từ Google Sheets. Vui lòng tải lại trang!");
        });

    // 3. HÀM XỬ LÝ VÀ TƯƠNG TÁC BẢN ĐỒ
    function initMap() {
        document.querySelectorAll('svg > g[id]').forEach(lot => {
            const id = lot.id;

            // --- BƯỚC A: TẠO NHÃN TÊN VÀ TỰ ĐỘNG XOAY ---
            if (id.startsWith('LK') || id.startsWith('HH')) {
                const bbox = lot.getBBox();
                const centerX = bbox.x + bbox.width / 2;
                const centerY = bbox.y + bbox.height / 2;

                let textAngle = 0;
                const shape = lot.querySelector('rect, polygon, path'); 

                // Đổi màu lô đất thành Xám đen nếu đã bán trên Google Sheet
                if (shape && dataBDS[id]) {
                    if (dataBDS[id].trangThai === "Đã bán" || dataBDS[id].trangThai === "Đã Bán") {
                        shape.style.fill = "#7f8c8d"; // Tô màu xám
                        shape.style.opacity = "0.7";  // Hơi trong suốt
                    }
                }

                // Tính góc nghiêng
                if (shape) {
                    if (shape.tagName.toLowerCase() === 'rect') {
                        let baseAngle = 0;
                        const w = parseFloat(shape.getAttribute('width'));
                        const h = parseFloat(shape.getAttribute('height'));
                        if (h > w) baseAngle = -90; 
                        const transform = shape.getAttribute('transform');
                        if (transform && transform.includes('rotate')) {
                            const match = transform.match(/rotate\(([-0-9.]+)/);
                            if (match) baseAngle += parseFloat(match[1]);
                        }
                        textAngle = baseAngle;
                    } else if (shape.tagName.toLowerCase() === 'polygon') {
                        const pointsStr = shape.getAttribute('points').trim().split(/[\s,]+/);
                        const points = [];
                        for (let i = 0; i < pointsStr.length; i += 2) {
                            if (pointsStr[i] !== undefined && pointsStr[i+1] !== undefined) {
                                points.push({x: parseFloat(pointsStr[i]), y: parseFloat(pointsStr[i+1])});
                            }
                        }
                        if (points.length >= 3) {
                            let maxDist = 0;
                            for (let i = 0; i < points.length; i++) {
                                let p1 = points[i];
                                let p2 = points[(i + 1) % points.length];
                                let dx = p2.x - p1.x;
                                let dy = p2.y - p1.y;
                                let dist = dx*dx + dy*dy; 
                                if (dist > maxDist) {
                                    maxDist = dist;
                                    textAngle = Math.atan2(dy, dx) * (180 / Math.PI);
                                }
                            }
                        }
                    }
                }

                while (textAngle > 90) textAngle -= 180;
                while (textAngle <= -90) textAngle += 180;

                const textLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textLabel.setAttribute("x", centerX);
                textLabel.setAttribute("y", centerY);
                textLabel.setAttribute("text-anchor", "middle");
                textLabel.setAttribute("dominant-baseline", "middle");
                textLabel.setAttribute("class", "lot-label");
                textLabel.setAttribute("transform", `rotate(${textAngle} ${centerX} ${centerY})`);
                textLabel.textContent = id; 
                lot.appendChild(textLabel);
            }

            // --- BƯỚC B: SỰ KIỆN CLICK VÀO LÔ ĐẤT ---
            lot.addEventListener('click', function(e) {
                const info = dataBDS[id]; 
                if (info) {
                    document.getElementById('malo').innerText = "Lô: " + id;
                    
                    // Logic màu sắc trạng thái
                    const statusEl = document.getElementById('trangThai');
                    statusEl.innerText = info.trangThai;
                    if (info.trangThai === "Đang bán") {
                        statusEl.style.color = "#27ae60"; // Màu xanh lá
                    } else if (info.trangThai === "Đã bán" || info.trangThai === "Đã Bán") {
                        statusEl.style.color = "#e74c3c"; // Màu đỏ
                    } else {
                        statusEl.style.color = "#f39c12"; // Màu cam
                    }

                    document.getElementById('loai').innerText = info.loai;
                    document.getElementById('dientich').innerText = info.dienTichLo;
                    document.getElementById('sotang').innerText = info.chieuCao;
                    document.getElementById('dtxd').innerText = info.dienTichXD;
                    document.getElementById('matdo').innerText = info.matDo;
                    document.getElementById('t1').innerText = info.tang1;
                    document.getElementById('t2').innerText = info.tang2;
                    document.getElementById('t3').innerText = info.tang3;
                    document.getElementById('t4').innerText = info.tang4_tum;
                    document.getElementById('t5').innerText = info.tang5;

                    const rowT4 = document.getElementById('row-t4');
                    const rowT5 = document.getElementById('row-t5');

                    if (id.startsWith("LK")) {
                        rowT4.querySelector('span').innerText = "Tầng Tum:";
                        rowT5.style.display = "none"; 
                    } else {
                        rowT4.querySelector('span').innerText = "Tầng 4:";
                        rowT5.style.display = "flex"; 
                    }

                    infoBox.style.display = "block";
                    if (window.innerWidth <= 768) {
                        infoBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    e.stopPropagation(); 
                }
            });
        });
    } // HẾT HÀM initMap()

    // 4. XỬ LÝ ĐÓNG POPUP
    document.addEventListener('click', function() { infoBox.style.display = "none"; });
    infoBox.addEventListener('click', function(e) { e.stopPropagation(); });

    // 5. KHỞI TẠO ZOOM VÀ PAN
    window.onload = function() {
        var eventsHandler = {
            haltEventListeners: ['touchstart', 'touchend', 'touchmove', 'touchleave', 'touchcancel'],
            init: function(options) {
                var instance = options.instance, initialScale = 1, pannedX = 0, pannedY = 0;
                this.hammer = new Hammer(options.svgElement, { 
                    recognizers: [ [Hammer.Pan, {direction: Hammer.DIRECTION_ALL}], [Hammer.Pinch, {enable: true}] ] 
                });
                this.hammer.on('panstart panmove', function(ev){
                    if (ev.type === 'panstart') { pannedX = 0; pannedY = 0; }
                    instance.panBy({x: ev.deltaX - pannedX, y: ev.deltaY - pannedY});
                    pannedX = ev.deltaX; pannedY = ev.deltaY;
                });
                this.hammer.on('pinchstart pinchmove', function(ev){
                    if (ev.type === 'pinchstart') { initialScale = instance.getZoom(); }
                    instance.zoomAtPoint(initialScale * ev.scale, {x: ev.center.x, y: ev.center.y});
                });
            },
            destroy: function(){ this.hammer.destroy(); }
        };

        svgPanZoom('#map-svg', {
            zoomEnabled: true,
            controlIconsEnabled: true, 
            fit: true,                 
            center: true,              
            minZoom: 0.5,
            maxZoom: 10,
            mouseWheelZoomEnabled: true, 
            preventMouseEventsDefault: false, 
            customEventsHandler: eventsHandler 
        });
    };
</script>
</body>
</html>
